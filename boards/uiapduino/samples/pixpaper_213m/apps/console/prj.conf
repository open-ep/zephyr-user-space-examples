# PixPaper 2.13" mono on CH32V003: 16KB flash / 2KB RAM, so strip Zephyr down
# to a single-threaded GPIO-only build (saves ~2.6KB ROM / 450B RAM vs default).
CONFIG_GPIO=y
CONFIG_MULTITHREADING=n
# UART for the interactive command console (polled, no interrupts/threads).
# Zephyr's CONFIG_SHELL is 10KB+ and doesn't fit; main.c implements a tiny
# command loop over the raw uart_poll_* API instead.
CONFIG_SERIAL=y
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_BOOT_BANNER=n
