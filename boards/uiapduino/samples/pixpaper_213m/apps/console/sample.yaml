sample:
  name: pixpaper-213m e-paper - console (bit-banged SPI)
  description: >
    Draw a bundled image on the Open-EP pixpaper-213m 2.13" monochrome e-paper
    panel at boot, then serve an interactive UART command console (draw / load
    a new image over UART / diagnostics) on the UIAPduino Pro Micro CH32V003.
tests:
  sample.boards.uiap.uiapduino.pixpaper_213m.console:
    platform_allow:
      - uiapduino_pro_micro_ch32v003
    tags:
      - gpio
      - uart
      - displays
    depends_on:
      - gpio
    build_only: true
